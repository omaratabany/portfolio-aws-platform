<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000018" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="300" fill="#f9fafb" rx="8" />

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Event Ingestion — Data Flow</text>

  <!-- ── Row 1: main pipeline ── -->

  <!-- Client -->
  <rect x="30" y="85" width="100" height="52" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)" />
  <text x="80" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Client</text>
  <text x="80" y="123" text-anchor="middle" font-size="10" fill="#6b7280">HTTP POST</text>

  <!-- Arrow: Client → API GW -->
  <line x1="130" y1="111" x2="188" y2="111" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="159" y="105" text-anchor="middle" font-size="9" fill="#6b7280">HTTPS</text>

  <!-- API Gateway -->
  <rect x="190" y="85" width="130" height="52" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)" />
  <text x="255" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">API Gateway v2</text>
  <text x="255" y="123" text-anchor="middle" font-size="10" fill="#c2410c">POST /ingest</text>

  <!-- Arrow: API GW → Lambda -->
  <line x1="320" y1="111" x2="378" y2="111" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="349" y="105" text-anchor="middle" font-size="9" fill="#6b7280">invoke</text>

  <!-- Lambda -->
  <rect x="380" y="85" width="130" height="52" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)" />
  <text x="445" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Lambda</text>
  <text x="445" y="123" text-anchor="middle" font-size="10" fill="#c2410c">Python 3.12</text>

  <!-- Arrow: Lambda → S3 -->
  <line x1="510" y1="111" x2="568" y2="111" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="539" y="105" text-anchor="middle" font-size="9" fill="#6b7280">PutObject</text>

  <!-- S3 -->
  <rect x="570" y="85" width="130" height="52" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)" />
  <text x="635" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">S3</text>
  <text x="635" y="123" text-anchor="middle" font-size="10" fill="#c2410c">events/YYYY-MM-DD/</text>

  <!-- Arrow: Lambda → CloudWatch (down) -->
  <line x1="445" y1="137" x2="445" y2="188" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowhead)" />
  <text x="470" y="168" text-anchor="start" font-size="9" fill="#6b7280">logs + metrics</text>

  <!-- CloudWatch -->
  <rect x="380" y="190" width="130" height="52" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)" />
  <text x="445" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">CloudWatch</text>
  <text x="445" y="228" text-anchor="middle" font-size="10" fill="#1d4ed8">Logs + Alarms</text>

  <!-- IAM note -->
  <rect x="570" y="190" width="130" height="52" rx="6" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)" />
  <text x="635" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">IAM Role</text>
  <text x="635" y="228" text-anchor="middle" font-size="10" fill="#15803d">Least-privilege</text>

  <!-- Arrow: IAM → Lambda (dashed) -->
  <line x1="570" y1="216" x2="511" y2="145" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowhead)" />

  <!-- Response arrow back (dashed) -->
  <line x1="188" y1="120" x2="130" y2="120" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrowhead)" />
  <text x="159" y="136" text-anchor="middle" font-size="9" fill="#9ca3af">200 / id + key</text>

  <!-- Legend -->
  <rect x="30" y="255" width="14" height="10" rx="2" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" />
  <text x="50" y="265" font-size="10" fill="#6b7280">AWS service</text>
  <rect x="130" y="255" width="14" height="10" rx="2" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.2" />
  <text x="150" y="265" font-size="10" fill="#6b7280">Observability</text>
  <rect x="240" y="255" width="14" height="10" rx="2" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.2" />
  <text x="260" y="265" font-size="10" fill="#6b7280">Security</text>
  <line x1="320" y1="260" x2="344" y2="260" stroke="#555" stroke-width="1.5" />
  <text x="350" y="265" font-size="10" fill="#6b7280">Data path</text>
  <line x1="420" y1="260" x2="444" y2="260" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="4 3" />
  <text x="450" y="265" font-size="10" fill="#6b7280">Control / side-channel</text>
</svg>
